name: 🎯 Summer Opportunity Agent

on:
  # Runs daily at 06:00 UTC = 11:00 AM Uzbekistan (UTC+5)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from GitHub Actions UI anytime
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual trigger"

jobs:
  run-agent:
    name: Search & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run opportunity agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python agent.py

      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-failure-logs
          path: "*.log"
          retention-days: 7
